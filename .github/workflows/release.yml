name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: domain-scan-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: domain-scan-darwin-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: domain-scan-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: domain-scan-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p domain-scan-cli

      - name: Archive binary (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz domain-scan
          cd ../../..

      - name: Archive binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/domain-scan.exe -DestinationPath ${{ matrix.name }}.zip

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  build-tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install UI dependencies
        working-directory: crates/domain-scan-tauri/ui
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (Apple Silicon)
        run: cargo tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: domain-scan-aarch64-apple-darwin-dmg
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-tauri-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install UI dependencies
        working-directory: crates/domain-scan-tauri/ui
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build --bundles deb,appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: domain-scan-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install UI dependencies
        working-directory: crates/domain-scan-tauri/ui
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build --bundles msi,nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: domain-scan-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  create-release:
    needs: [build-cli, build-tauri-macos, build-tauri-linux, build-tauri-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
